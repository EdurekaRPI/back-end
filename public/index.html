<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive event table displaying event details dynamically.">
    <title>Event Table</title>
    <link rel="stylesheet" href="stylesheets/style.css">
</head>
<body>
    <header>
        <h1 style="text-align: center; margin-bottom: 20px; font-family: Arial, sans-serif; color: #047727;">
            Upcoming Events
        </h1>
    </header>
    <main>
        <section>
            <table id="userTable" aria-label="Event details table">
                <caption>Explore the latest events happening near you!</caption>
                <thead>
                    <tr>
                        <th scope="col">Title</th>
                        <th scope="col">Description</th>
                        <th scope="col">Location</th>
                        <th scope="col">Time</th>
                        <th scope="col">Club</th>
                        <th scope="col">Date</th>
                        <th scope="col">Image</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Event data will be dynamically added here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: #666;">
        <p>&copy; 2024 Event Organizer. All Rights Reserved.</p>
    </footer>
    <script src="/js/app.js"></script>
</body>
</html>
